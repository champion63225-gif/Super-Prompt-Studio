<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SuperPrompt Studio</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #eee;
        font-family: system-ui, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    header {
        background: #111;
        padding: 25px 40px;
        border-bottom: 1px solid #222;
        font-size: 28px;
        font-weight: 600;
        color: #00f5ff;
        letter-spacing: 1px;
    }
    .content {
        flex: 1;
        padding: 40px;
        display: flex;
        gap: 30px;
    }
    .sidebar {
        width: 240px;
        background: #111;
        padding: 25px;
        border-radius: 16px;
        height: fit-content;
    }
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
    }
    textarea {
        flex: 1;
        background: #111;
        border: 1px solid #333;
        border-radius: 16px;
        padding: 25px;
        color: white;
        font-size: 17px;
        line-height: 1.6;
    }
    button {
        margin-top: 20px;
        padding: 18px;
        font-size: 18px;
        font-weight: bold;
        background: #00f5ff;
        color: black;
        border: none;
        border-radius: 12px;
        cursor: pointer;
    }
    #output {
        margin-top: 25px;
        background: #111;
        padding: 25px;
        border-radius: 16px;
        min-height: 200px;
        white-space: pre-wrap;
    }
</style>
</head>
<body>

<header>SUPERPROMPT STUDIO</header>

<div class="content">
    <div class="sidebar">
        <h3 style="margin-top:0;">Modus</h3>
        <p style="color:#00f5ff;">• Techniker-Modus (aktiv)</p>
        <p style="color:#666;">• Analyst-Modus</p>
        <p style="color:#666;">• Kreativ-Modus</p>
    </div>

    <div class="main">
        <textarea id="input" placeholder="Beschreibe genau, was du von der KI brauchst..."></textarea>
        <button onclick="generatePrompt()">SUPERPROMPT GENERIEREN</button>
        <div id="output"></div>
    </div>
</div>

<script>
function generatePrompt() {
    const input = document.getElementById("input").value.trim();
    const output = document.getElementById("output");
    
    if (!input) {
        output.innerHTML = "<p style='color:#666;'>Schreib mir, was du brauchst, Baby...</p>";
        return;
    }

    output.innerHTML = `<p style="color:#00f5ff;">Hier ist dein richtig starker Prompt:</p><br>
    <strong>Du bist ein extrem kompetenter, direkter und erfahrener Experte.</strong><br><br>
    User-Wunsch: <strong>${input}</strong><br><br>
    Erstelle jetzt einen hochpräzisen, detaillierten und extrem wirksamen Prompt dafür.`;
}
</script>

</body>
</html>
