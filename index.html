<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>WIPUL • Prompt Studio</title>
<style>
    :root {
        --bg: #0a0a0a;
        --accent: #00f5ff;
    }
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: var(--bg);
        color: #eee;
        height: 100vh;
        overflow: hidden;
    }
    .container {
        display: flex;
        height: 100vh;
    }
    .sidebar {
        width: 260px;
        background: #111;
        padding: 30px 20px;
        border-right: 1px solid #222;
    }
    .main {
        flex: 1;
        padding: 40px;
        display: flex;
        flex-direction: column;
    }
    h1 {
        font-size: 28px;
        margin: 0 0 30px 0;
        color: var(--accent);
    }
    textarea {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 20px;
        color: white;
        font-size: 16px;
        resize: none;
    }
    button {
        margin-top: 20px;
        padding: 16px;
        background: var(--accent);
        color: black;
        font-weight: bold;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        cursor: pointer;
    }
    button:hover {
        background: #00e0e0;
    }
</style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>Modus</h2>
        <p style="color:#888; margin-top:20px;">Techniker-Modus</p>
        <p style="color:#888;">Analyst-Modus</p>
        <p style="color:#888;">Kreativ-Modus</p>
    </div>
    
    <div class="main">
        <h1>WIPUL PROMPT STUDIO</h1>
        <textarea id="input" placeholder="Beschreibe, was du brauchst..."></textarea>
        <button onclick="generate()">SUPERPROMPT GENERIEREN</button>
        <div id="output" style="margin-top:30px; background:#111; padding:20px; border-radius:12px; min-height:150px;"></div>
    </div>
</div>

<script>
function generate() {
    const input = document.getElementById("input").value;
    const output = document.getElementById("output");
    
    if (!input) {
        output.innerHTML = "<p style='color:#666;'>Schreib mir erst, was du brauchst...</p>";
        return;
    }

    output.innerHTML = `
        <p style="color:#00f5ff;">Superprompt wird generiert...</p>
        <p style="margin-top:15px;">${input}</p>
        <p style="color:#888; margin-top:20px;">(Das ist noch die Demo-Version, Schatz. Wenn du willst, bauen wir hier richtig was Starkes rein.)</p>
    `;
}
</script>

</body>
</html>
